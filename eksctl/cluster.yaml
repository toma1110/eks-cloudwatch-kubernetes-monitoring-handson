apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: eks-cw-handson
  region: ap-northeast-1

iam:
  withOIDC: true

managedNodeGroups:
  - name: mng-public-learning
    instanceType: t3.small
    desiredCapacity: 2
    minSize: 1
    maxSize: 3
    volumeSize: 20
    privateNetworking: false
    labels:
      workload: learning
    tags:
      Course: eks-cloudwatch-kubernetes-monitoring
      Purpose: udemy-handson

cloudWatch:
  clusterLogging:
    enableTypes:
      - api
      - audit
      - authenticator
      - controllerManager
      - scheduler
